<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Фоновый прямоугольник с градиентом -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    
    <!-- Фильтр для легкой тени -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="256" height="256" rx="40" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Белый фон для документа -->
  <rect x="48" y="48" width="130" height="160" rx="12" fill="white" filter="url(#shadow)"/>
  
  <!-- Линии текста на документе -->
  <rect x="78" y="88" width="70" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="78" y="108" width="90" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="78" y="128" width="85" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="78" y="148" width="95" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="78" y="168" width="60" height="6" rx="3" fill="#e0e0e0"/>
  
  <!-- Линия сгиба на документе (уголок) -->
  <path d="M178 48 L178 78 L148 48" fill="#e0e0e0" opacity="0.5"/>
  
  <!-- Лупа (увеличительное стекло) -->
  <circle cx="158" cy="148" r="42" fill="none" stroke="#27ae60" stroke-width="10"/>
  <circle cx="158" cy="148" r="25" fill="white" stroke="#27ae60" stroke-width="4"/>
  
  <!-- Ручка лупы -->
  <rect x="192" y="182" width="40" height="10" rx="5" transform="rotate(45, 192, 182)" fill="#27ae60"/>
  
  <!-- Символ "скан" (стрелка сканирования) -->
  <path d="M200 80 L230 80 L230 110" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M230 80 L215 95" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>